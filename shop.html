<!DOCTYPE html>

<!-- Define que o documento usa HTML5 -->
<html lang="pt-br">

<head>

    <!-- Codificação de caracteres (acentos, símbolos, etc.) -->
    <meta charset="UTF-8">

    <!-- Responsividade para mobile/tablet -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba do navegador -->
    <title>Flow - Loja de Skins</title>

    <!-- Ficheiro de estilos da loja -->
    <link rel="stylesheet" href="css/shop.css">

    <!-- Ícone da aba do navegador -->
    <!-- O parâmetro ?v=2 força atualização do cache do navegador -->
    <link rel="icon" href="/Imagens/Logo.png?v=2">

</head>

<body>

<!-- =========================
     BARRA DE NAVEGAÇÃO
========================= -->

<nav>

    <!-- Links principais da aplicação -->
    <div class="nav-links">

        <!-- Logo clicável que leva para a página inicial -->
        <a href="home.html">

            <img
                src="Imagens/Logo.png"
                alt="Logo Flow"
                class="logo"
                style="height: 40px; vertical-align: middle;">

        </a>

        <!-- Link para tarefas -->
        <a href="home.html">Tarefas</a>

        <!-- Link para a loja -->
        <a href="shop.html">Loja</a>

        <!-- Link para a estatística -->
        <a href="stats.html">Estatísticas</a>

        <!-- Botão de sair (apenas redireciona para login) -->
        <a href="index.html" style="color: #ff4b4b;">
            Sair
        </a>

    </div>

    <!-- Exibição de moedas do jogador -->
    <div class="currency-display">

        <!-- Diamantes -->
        <span>
            💎 <span id="diamonds">0</span>
        </span>

        <!-- Moedas -->
        <span>
            💰 <span id="coins">0</span>
        </span>

    </div>

</nav>

<!-- =========================
     TÍTULO DA LOJA
========================= -->

<h1 style="text-align: center; margin-top: 30px;">
    Loja de Skins
</h1>

<!-- =========================
     CONTAINER DAS SKINS
========================= -->

<!-- As skins são inseridas dinamicamente via JavaScript -->
<div class="shop-container" id="shop-grid"></div>

<!-- =========================
     SCRIPT PRINCIPAL
========================= -->

<!-- Controla toda a lógica da loja:
     renderização, compra, equipar e salvamento -->
    <script src="js/alerts.js"></script>
    <script src="js/shop.js"></script>
    
    <div id="game-alert"></div>

</body>
</html>
